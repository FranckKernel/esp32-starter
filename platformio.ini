[env:normal]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_port = /dev/ttyACM0

build_src_filter =
    -<Sources/*>
    +<main.cpp>


[env:test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_port = /dev/ttyACM0

build_src_filter =
    -<main.cpp>
    +<Sources/main.cpp>
